<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#2c6e62"/>
  <!-- Envelope body -->
  <rect x="5" y="10" width="22" height="15" rx="1.5" fill="none" stroke="#e7e4da" stroke-width="1.8"/>
  <!-- Envelope flap / V crease -->
  <polyline points="5,10 16,19 27,10" fill="none" stroke="#e7e4da" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Stamp square top-right -->
  <rect x="20" y="5" width="7" height="7" rx="1" fill="none" stroke="#e7e4da" stroke-width="1.4" stroke-dasharray="1.6 1.2"/>
</svg>
